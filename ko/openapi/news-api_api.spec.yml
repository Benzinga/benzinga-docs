openapi: 3.0.0
info:
  contact: {}
  description: 이 REST API는 뉴스 기사 및 보도자료에 대한 구조화된 데이터를 반환합니다.
  termsOfService: http://swagger.io/terms/
  title: News API
  version: 2.1.0
paths:
  /api/v2/news:
    get:
      description: 뉴스 조회
      operationId: get-news
      parameters:
        - description: 티커
          in: query
          name: tickers
          schema:
            type: string
        - description: CUSIP
          in: query
          name: cusips
          schema:
            type: string
        - description: 국제증권식별번호(ISIN)
          in: query
          name: isins
          schema:
            type: string
        - description: 채널
          in: query
          name: channels
          schema:
            type: string
        - description: 주제
          in: query
          name: topics
          schema:
            type: string
        - description: 작성자
          in: query
          name: authors
          schema:
            type: string
        - description: 콘텐츠 유형
          in: query
          name: contentTypes
          schema:
            type: string
        - description: 정렬
          in: query
          name: sort
          schema:
            type: string
        - description: 날짜
          in: query
          name: date
          schema:
            type: string
            format: date
        - description: 게시 이후
          in: query
          name: publishedSince
          schema:
            type: string
        - description: 업데이트 이후
          in: query
          name: updatedSince
          schema:
            type: string
        - description: 시작일
          in: query
          name: dateFrom
          schema:
            type: string
        - description: 종료일
          in: query
          name: dateTo
          schema:
            type: string
        - description: 페이지 크기
          in: query
          name: pageSize
          schema:
            type: integer
        - description: 페이지
          in: query
          name: page
          schema:
            type: integer
        - description: 마지막 ID
          in: query
          name: lastID
          schema:
            type: string
        - description: 출력 표시
          in: query
          name: displayOutput
          schema:
            type: string
        - description: 노이즈
          in: query
          name: noise
          schema:
            type: string
        - description: 중요도
          in: query
          name: importance
          schema:
            type: string
        - description: 형식
          in: query
          name: format
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsItem"
                type: array
            text/xml:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsItem"
                type: array
        "400":
          description: 유효하지 않거나 누락된 쿼리 매개변수
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "499":
          description: 요청 컨텍스트가 취소됨
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "500":
          description: 내부 오류
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: 뉴스 조회
      tags:
        - News
  /api/v2/news/removed:
    get:
      description: 삭제된 뉴스 조회
      operationId: get-removed-news
      parameters:
        - description: 업데이트 이후
          in: query
          name: updatedSince
          schema:
            type: string
        - description: 페이지 크기
          in: query
          name: pageSize
          schema:
            type: integer
        - description: 페이지
          in: query
          name: page
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsRemovedItem"
                type: array
            text/xml:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsRemovedItem"
                type: array
        "400":
          description: 잘못되었거나 누락된 쿼리 매개변수
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "499":
          description: 요청 컨텍스트가 취소됨
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "500":
          description: 내부 오류
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: 삭제된 뉴스 조회
      tags:
        - News
components:
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: token
      type: apiKey
  schemas:
    api.ChannelTag:
      properties:
        name:
          type: string
      type: object
    api.Image:
      properties:
        size:
          type: string
        url:
          type: string
      type: object
    api.NewsItem:
      properties:
        author:
          type: string
        body:
          type: string
        channels:
          items:
            $ref: "#/components/schemas/api.ChannelTag"
          type: array
        created:
          type: string
        id:
          type: integer
        image:
          items:
            $ref: "#/components/schemas/api.Image"
          type: array
        original_id:
          type: integer
        stocks:
          items:
            $ref: "#/components/schemas/api.Stock"
          type: array
        tags:
          items:
            $ref: "#/components/schemas/api.ChannelTag"
          type: array
        teaser:
          type: string
        title:
          type: string
        updated:
          type: string
        url:
          type: string
      type: object
    api.NewsRemovedItem:
      properties:
        id:
          type: integer
        updated:
          type: string
      type: object
    api.Stock:
      properties:
        cusip:
          type: string
        exchange:
          type: string
        isin:
          type: string
        name:
          type: string
      type: object

openapi: 3.0.0
info:
  contact: {}
  description: تُرجِع واجهة برمجة التطبيقات REST هذه بيانات منظَّمة للمقالات
    الإخبارية والبيانات الصحفية.
  termsOfService: http://swagger.io/terms/
  title: News API
  version: 2.1.0
paths:
  /api/v2/news:
    get:
      description: جلب الأخبار
      operationId: get-news
      parameters:
        - description: رموز الأسهم
          in: query
          name: tickers
          schema:
            type: string
        - description: أرقام CUSIP
          in: query
          name: cusips
          schema:
            type: string
        - description: أرقام التعريف الدولي للأوراق المالية ISIN
          in: query
          name: isins
          schema:
            type: string
        - description: القنوات
          in: query
          name: channels
          schema:
            type: string
        - description: الموضوعات
          in: query
          name: topics
          schema:
            type: string
        - description: المؤلفون
          in: query
          name: authors
          schema:
            type: string
        - description: أنواع المحتوى
          in: query
          name: contentTypes
          schema:
            type: string
        - description: الفرز
          in: query
          name: sort
          schema:
            type: string
        - description: التاريخ
          in: query
          name: date
          schema:
            type: string
            format: date
        - description: منشور منذ
          in: query
          name: publishedSince
          schema:
            type: string
        - description: محدَّث منذ
          in: query
          name: updatedSince
          schema:
            type: string
        - description: التاريخ من
          in: query
          name: dateFrom
          schema:
            type: string
        - description: التاريخ إلى
          in: query
          name: dateTo
          schema:
            type: string
        - description: حجم الصفحة
          in: query
          name: pageSize
          schema:
            type: integer
        - description: الصفحة
          in: query
          name: page
          schema:
            type: integer
        - description: آخر معرّف
          in: query
          name: lastID
          schema:
            type: string
        - description: عرض الناتج
          in: query
          name: displayOutput
          schema:
            type: string
        - description: الضوضاء
          in: query
          name: noise
          schema:
            type: string
        - description: الأهمية
          in: query
          name: importance
          schema:
            type: string
        - description: التنسيق
          in: query
          name: format
          schema:
            type: string
      responses:
        "200":
          description: موافق
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsItem"
                type: array
            text/xml:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsItem"
                type: array
        "400":
          description: معلمات الاستعلام غير صالحة أو مفقودة
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "499":
          description: تم إلغاء سياق الطلب
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "500":
          description: خطأ داخلي
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: جلب الأخبار
      tags:
        - News
  /api/v2/news/removed:
    get:
      description: جلب الأخبار المحذوفة
      operationId: get-removed-news
      parameters:
        - description: محدَّث منذ
          in: query
          name: updatedSince
          schema:
            type: string
        - description: حجم الصفحة
          in: query
          name: pageSize
          schema:
            type: integer
        - description: الصفحة
          in: query
          name: page
          schema:
            type: integer
      responses:
        "200":
          description: موافق
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsRemovedItem"
                type: array
            text/xml:
              schema:
                items:
                  $ref: "#/components/schemas/api.NewsRemovedItem"
                type: array
        "400":
          description: معلَمات الاستعلام غير صالحة أو مفقودة
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "499":
          description: تم إلغاء سياق الطلب
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
        "500":
          description: خطأ داخلي
          content:
            application/json:
              schema:
                type: string
            text/xml:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
      summary: جلب الأخبار المحذوفة
      tags:
        - News
components:
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: token
      type: apiKey
  schemas:
    api.ChannelTag:
      properties:
        name:
          type: string
      type: object
    api.Image:
      properties:
        size:
          type: string
        url:
          type: string
      type: object
    api.NewsItem:
      properties:
        author:
          type: string
        body:
          type: string
        channels:
          items:
            $ref: "#/components/schemas/api.ChannelTag"
          type: array
        created:
          type: string
        id:
          type: integer
        image:
          items:
            $ref: "#/components/schemas/api.Image"
          type: array
        original_id:
          type: integer
        stocks:
          items:
            $ref: "#/components/schemas/api.Stock"
          type: array
        tags:
          items:
            $ref: "#/components/schemas/api.ChannelTag"
          type: array
        teaser:
          type: string
        title:
          type: string
        updated:
          type: string
        url:
          type: string
      type: object
    api.NewsRemovedItem:
      properties:
        id:
          type: integer
        updated:
          type: string
      type: object
    api.Stock:
      properties:
        cusip:
          type: string
        exchange:
          type: string
        isin:
          type: string
        name:
          type: string
      type: object
